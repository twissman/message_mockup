<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation History — Reading Pane Mockup</title>
<style>
  :root{
    --bg:#f3f2f1;
    --panel:#ffffff;
    --border:#e1dfdd;
    --border-strong:#c8c6c4;
    --text:#1b1a19;
    --text-secondary:#605e5c;
    --text-tertiary:#8a8886;
    --accent:#2564cf;
    --accent-bg:#eef3fc;

    --green:#22c55e;
    --green-bg:#f0fdf4;
    --blue:#3b82f6;
    --blue-bg:#eff6ff;

    --in-bg:#dcfce7; --in-text:#15803d;
    --out-bg:#dbeafe; --out-text:#1d4ed8;
    --gmail-bg:#e0e7ff; --gmail-text:#4338ca;
    --ghl-bg:#fef3c7; --ghl-text:#92400e;
    --sms-bg:#f3e8ff; --sms-text:#7c3aed;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:13px;
  }
  #shell{
    max-width:1180px;
    margin:0 auto;
    padding:20px;
  }
  #panelHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:4px;
  }
  #panelHeader .label{
    font-size:11px;
    font-weight:700;
    color:var(--text-secondary);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  #panelHeader .contactName{
    font-size:11px;
    color:var(--text-tertiary);
  }
  #mainGrid{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:0;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    height:640px;
    background:var(--panel);
  }

  /* ---- LEFT: thread list ---- */
  #threadList{
    border-right:1px solid var(--border);
    overflow-y:auto;
    background:#fafafa;
  }
  .thread-block{
    border-bottom:1px solid var(--border);
  }
  .thread-header{
    display:flex;
    align-items:center;
    gap:7px;
    padding:10px 12px;
    cursor:pointer;
  }
  .thread-header:hover{background:#f0f0f0;}
  .thread-header.is-open{background:#eef3fc;}
  .thread-icon{
    font-size:13px;
    flex-shrink:0;
    width:14px;
    text-align:center;
  }
  .thread-subject{
    flex:1;
    min-width:0;
    font-size:12.5px;
    font-weight:600;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:#1f2937;
  }
  .count-badge{
    font-size:9.5px;
    font-weight:700;
    background:#f3f4f6;
    color:#6b7280;
    border-radius:9px;
    padding:1px 6px;
    flex-shrink:0;
  }
  .src-badge{
    font-size:8.5px;
    font-weight:700;
    border-radius:3px;
    padding:1px 5px;
    flex-shrink:0;
    letter-spacing:0.02em;
  }
  .src-badge.gmail{background:var(--gmail-bg); color:var(--gmail-text);}
  .src-badge.ghl{background:var(--ghl-bg); color:var(--ghl-text);}
  .src-badge.sms{background:var(--sms-bg); color:var(--sms-text);}
  .thread-date{
    font-size:10px;
    color:var(--text-tertiary);
    flex-shrink:0;
    white-space:nowrap;
  }
  .chevron{
    font-size:9px;
    color:var(--text-tertiary);
    flex-shrink:0;
    transition:transform 0.15s;
    width:10px;
  }
  .thread-preview{
    padding:0 12px 9px 33px;
    font-size:11.5px;
    color:var(--text-secondary);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    cursor:pointer;
  }

  .msg-sublist{
    background:#fff;
    padding:4px 8px 8px 28px;
    display:flex;
    flex-direction:column;
    gap:3px;
  }
  .msg-row{
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
    border-radius:5px;
    cursor:pointer;
    border:1px solid transparent;
  }
  .msg-row:hover{background:#f8f9fb;}
  .msg-row.selected{
    background:var(--accent-bg);
    border-color:#cfe1f7;
  }
  .msg-dir{
    font-size:8.5px;
    font-weight:800;
    padding:1px 5px;
    border-radius:3px;
    flex-shrink:0;
    letter-spacing:0.03em;
  }
  .msg-dir.in{background:var(--in-bg); color:var(--in-text);}
  .msg-dir.out{background:var(--out-bg); color:var(--out-text);}
  .msg-from{
    flex:1;
    min-width:0;
    font-size:11px;
    color:#4b5563;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .msg-date{
    font-size:10px;
    color:var(--text-tertiary);
    flex-shrink:0;
    white-space:nowrap;
  }

  /* ---- RIGHT: reading pane ---- */
  #readingPane{
    overflow-y:auto;
    padding:0;
  }
  #readingEmpty{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-tertiary);
    font-size:13px;
    flex-direction:column;
    gap:8px;
  }
  #readingEmpty .icon{font-size:32px; opacity:0.5;}
  .reading-header{
    padding:18px 24px 14px;
    border-bottom:1px solid var(--border);
  }
  .reading-header .subj{
    font-size:16px;
    font-weight:700;
    margin-bottom:8px;
  }
  .reading-meta{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .reading-meta .from-to{
    font-size:12px;
    color:var(--text-secondary);
  }
  .reading-date{
    font-size:11.5px;
    color:var(--text-tertiary);
    margin-top:4px;
  }
  .reading-body{
    padding:20px 24px;
    font-size:13.5px;
    line-height:1.65;
    white-space:pre-wrap;
    word-break:break-word;
    color:#1f2937;
  }

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>

<div id="shell">
  <div id="panelHeader">
    <span class="label">Conversation History</span>
    <span class="contactName" id="contactNameLabel"></span>
  </div>
  <div id="mainGrid">
    <div id="threadList"></div>
    <div id="readingPane">
      <div id="readingEmpty"><div class="icon">&#9993;</div>Select a message to read it</div>
    </div>
  </div>
</div>

<script>
let DATA = null;
let openThreadKey = null;
let selectedMessage = null;

function fmtDate(iso, withYear){
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString(undefined, withYear ? {month:'short', day:'numeric', year:'numeric'} : {month:'short', day:'numeric'});
}
function fmtTime(iso){
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
}
function escapeHtml(s){
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function init(){
  const res = await fetch('mockup_data.json');
  DATA = await res.json();
  document.getElementById('contactNameLabel').textContent = DATA.contactName;
  renderThreadList();
}

function renderThreadList(){
  const list = document.getElementById('threadList');
  list.innerHTML = DATA.threads.map(t => {
    const isOpen = openThreadKey === t.threadKey;
    const icon = t.channel === 'email' ? '&#9993;' : '&#128241;';
    const displaySubject = t.subject && t.subject.trim() ? t.subject : (t.channel === 'email' ? '(no subject)' : 'SMS Conversation');
    const latest = t.messages[t.messages.length - 1];
    const preview = (latest.body || '').replace(/\s+/g,' ').slice(0, 90);

    let html = '<div class="thread-block">';
    html += '<div class="thread-header'+(isOpen?' is-open':'')+'" data-key="'+escapeHtml(t.threadKey)+'">' +
      '<span class="thread-icon">'+icon+'</span>' +
      '<span class="thread-subject">'+escapeHtml(displaySubject)+'</span>';
    if (t.messages.length > 1) html += '<span class="count-badge">'+t.messages.length+'</span>';
    if (t.hasGmail) html += '<span class="src-badge gmail">GMAIL</span>';
    if (t.hasGhl) html += '<span class="src-badge '+(t.channel==='sms'?'sms':'ghl')+'">'+(t.channel==='sms'?'SMS':'GHL')+'</span>';
    html += '<span class="thread-date">'+fmtDate(t.latestTs)+'</span>' +
      '<span class="chevron">'+(isOpen?'&#9662;':'&#9656;')+'</span>' +
    '</div>';

    if (!isOpen && preview){
      html += '<div class="thread-preview" data-key="'+escapeHtml(t.threadKey)+'">'+escapeHtml(preview)+(preview.length>=90?'…':'')+'</div>';
    }

    if (isOpen){
      const sorted = [...t.messages].sort((a,b) => new Date(b.ts) - new Date(a.ts));
      html += '<div class="msg-sublist">';
      sorted.forEach(m => {
        const isIn = m.direction === 'inbound';
        const sel = selectedMessage && selectedMessage.id === m.id ? ' selected' : '';
        const fromLabel = isIn ? (DATA.contactName || 'Contact') : 'Rep';
        html += '<div class="msg-row'+sel+'" data-id="'+escapeHtml(m.id)+'" data-thread="'+escapeHtml(t.threadKey)+'">' +
          '<span class="msg-dir '+(isIn?'in':'out')+'">'+(isIn?'IN':'OUT')+'</span>' +
          '<span class="msg-from">'+escapeHtml(fromLabel)+'</span>' +
          '<span class="msg-date">'+fmtDate(m.ts)+' '+fmtTime(m.ts)+'</span>' +
        '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
    return html;
  }).join('');

  list.querySelectorAll('.thread-header, .thread-preview').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      if (openThreadKey === key){
        openThreadKey = null;
      } else {
        openThreadKey = key;
        // auto-select the most recent message in this thread when opened
        const t = DATA.threads.find(t => t.threadKey === key);
        if (t) {
          const sorted = [...t.messages].sort((a,b) => new Date(b.ts) - new Date(a.ts));
          selectedMessage = sorted[0];
          renderReadingPane();
        }
      }
      renderThreadList();
    });
  });

  list.querySelectorAll('.msg-row').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const t = DATA.threads.find(t => t.threadKey === el.dataset.thread);
      const m = t.messages.find(m => m.id === el.dataset.id);
      selectedMessage = m;
      renderThreadList();
      renderReadingPane();
    });
  });
}

function renderReadingPane(){
  const pane = document.getElementById('readingPane');
  if (!selectedMessage){
    pane.innerHTML = '<div id="readingEmpty"><div class="icon">&#9993;</div>Select a message to read it</div>';
    return;
  }
  const m = selectedMessage;
  const isIn = m.direction === 'inbound';
  const subj = m.subject && m.subject.trim() ? m.subject : '(no subject)';
  const body = m.body ? escapeHtml(m.body) : '<span style="color:var(--text-tertiary); font-style:italic;">(no body text)</span>';
  const fromLabel = isIn ? (DATA.contactName || 'Contact') : 'Rep';
  const toLabel = isIn ? 'Rep' : (DATA.contactName || 'Contact');

  pane.innerHTML =
    '<div class="reading-header">' +
      '<div class="subj">'+escapeHtml(subj)+'</div>' +
      '<div class="reading-meta">' +
        '<span class="from-to"><strong>'+escapeHtml(fromLabel)+'</strong> &rarr; '+escapeHtml(toLabel)+'</span>' +
      '</div>' +
      '<div class="reading-date">'+fmtDate(m.ts, true)+' at '+fmtTime(m.ts)+'</div>' +
    '</div>' +
    '<div class="reading-body">'+body+'</div>';
}

init();
</script>
</body>
</html>
